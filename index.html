<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="manifest" href="manifest.json" />
  <title>What neighborhood is this?</title>
  <style>
    body {
      background-color: #1C2228;
      color: #F2F2F2;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 30px;
    }
    
    .place {
      color: #F2D35C;
      font-weight: 600;
    }
    
    #result {
      font-size: 22px;
      line-height: 1.3;
      white-space: pre-line;
    }
    footer {
      position: fixed;
      bottom: 30px;
      left: 30px;
      font-size: 14px;
      line-height: 1.5;
      color: #8F989F;
    }
    
    .brand {
      color: #E8C95A;
      font-weight: 600;
    }
    
    footer small {
      font-size: 12px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h3>What neighborhood is this?</h3>
  <p id="result">Getting location...</p>

  <footer>
    Brought to you by <span class="brand"><a href://www.sallin.com>Sallin.com</a></span><br>
    <small>Welcome Home</small>
  </footer>
  
  <script>
    async function findNeighborhood() {
      const result = document.getElementById("result");

      if (!navigator.geolocation) {
        result.innerHTML = "This device doesn't support location lookup.";
        return;
      }

      navigator.geolocation.getCurrentPosition(async position => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        try {
          const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`;
          const res = await fetch(url);
          const data = await res.json();
          const a = data.address || {};

          const hood = a.neighbourhood;
          const suburb = a.suburb;
          const city = a.city || a.town || a.village;

          if (hood && suburb && city) {
            result.innerHTML = `You're in the <span class="place">${hood}</span> neighborhood,<br> in the <span class="place">${suburb}</span> area of ${city}.`;
          } else if (hood && city) {
            result.innerHTML = `You're in the <span class="place">${hood}</span> neighborhood of ${city}.`;
          } else if (suburb && city) {
            result.innerHTML = `You're in the <span class="place">${suburb}</span> area of ${city}.`;
          } else if (city) {
            result.innerHTML = `You're in ${city}.`;
          } else {
            result.innerHTML = "I found your location, but not a specific neighborhood 😕";
          }
        } catch {
          result.innerHTML = "I got your location, but couldn't look up the neighborhood 😕";
        }
      }, () => {
        result.innerHTML = "Sorry, I couldn't get your location  😕";
      });
    }

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }

    findNeighborhood();

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        findNeighborhood();
      }
    });
  </script>
</body>  
</html>
