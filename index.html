<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="manifest" href="manifest.json" />
  <title>📍What neighborhood is this?</title>
  <style>
    h3 {
      text-align: center;
      font-weight: 500;
      color: #E8ECEF;
      margin-bottom: 30px;
    }
    
    body {
      background-color: #1C2228;
      color: #F2F2F2;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 30px;
    }
    
    .place {
      color: #F2D35C;
      font-weight: 600;
    }
    
    #result {
      font-size: 22px;
      line-height: 1.3;
      white-space: pre-line;
    }

    #rescanBtn {
      display: none;
      margin: 1.25rem auto 0;
      padding: 0.9rem 1.2rem;
      border: 0;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background-color: #F2D35C;
      color: #1C2228;
    }

    #rescanBtn:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    footer {
      position: fixed;
      bottom: 30px;
      left: 30px;
      font-size: 14px;
      line-height: 1.5;
      color: #8F989F;
    }
    
    .brand {
      color: #E8C95A;
      font-weight: 600;
    }
    
    footer small {
      font-size: 12px;
      font-style: italic;
    }

    a,
    a:visited {
      color: #E8C95A;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <h3>📍What neighborhood is this?</h3>

  <p id="result">Getting location...</p>

  <button id="rescanBtn" type="button">Check Again</button>

  <footer>
    Brought to you by <span class="brand"><a href="https://www.sallin.com">Sallin.com</a></span><br>
    <small>Welcome Home</small>
  </footer>
  
  <script>
    const result = document.getElementById("result");
    const rescanBtn = document.getElementById("rescanBtn");

    let hasCompletedInitialScan = false;

    function showRescanButtonAfterFirstUse() {
      if (!hasCompletedInitialScan) {
        hasCompletedInitialScan = true;
        rescanBtn.style.display = "inline-block";
      }
    }

    function setLoadingState(isLoading) {
      rescanBtn.disabled = isLoading;
      rescanBtn.textContent = isLoading ? "Checking..." : "Check Again";
    }

    function formatLocationResult(address) {
      const hood = address.neighbourhood;
      const suburb = address.suburb;
      const city = address.city || address.town || address.village;

      if (hood && suburb && city) {
        return `You're in the <span class="place">${hood}</span> neighborhood,<br> in the <span class="place">${suburb}</span> area of ${city}.`;
      } else if (hood && city) {
        return `You're in the <span class="place">${hood}</span> neighborhood of ${city}.`;
      } else if (suburb && city) {
        return `You're in the <span class="place">${suburb}</span> area of ${city}.`;
      } else if (city) {
        return `You're in ${city}.`;
      } else {
        return "I found your location, but not a specific neighborhood 😕";
      }
    }

    async function findNeighborhood() {
      if (!navigator.geolocation) {
        result.innerHTML = "This device doesn't support location lookup.";
        showRescanButtonAfterFirstUse();
        return;
      }

      result.innerHTML = "Getting location...";
      setLoadingState(true);

      navigator.geolocation.getCurrentPosition(
        async position => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;

          try {
            const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`;
            const res = await fetch(url);
            const data = await res.json();
            const address = data.address || {};

            result.innerHTML = formatLocationResult(address);
          } catch {
            result.innerHTML = "I got your location, but couldn't look up the neighborhood 😕";
          }

          setLoadingState(false);
          showRescanButtonAfterFirstUse();
        },
        error => {
          if (error.code === 1) {
            result.innerHTML = "Location permission was denied 😕";
          } else if (error.code === 2) {
            result.innerHTML = "Your location is currently unavailable 😕";
          } else if (error.code === 3) {
            result.innerHTML = "Location lookup timed out 😕";
          } else {
            result.innerHTML = "Sorry, I couldn't get your location 😕";
          }

          setLoadingState(false);
          showRescanButtonAfterFirstUse();
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );
    }

    rescanBtn.addEventListener("click", findNeighborhood);

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }

    findNeighborhood();

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        findNeighborhood();
      }
    });
  </script>
</body>  
</html>
